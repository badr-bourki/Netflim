<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 180" role="img" aria-labelledby="title desc">
  <title id="title">NETFLIM logo</title>
  <desc id="desc">Stylized red N icon and NETFLIM wordmark</desc>
  <defs>
    <linearGradient id="nGrad" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#ff5a3d"/>
      <stop offset="55%" stop-color="#e50914"/>
      <stop offset="100%" stop-color="#a80710"/>
    </linearGradient>
  </defs>

  <g transform="translate(24 18)">
    <rect x="0" y="0" width="28" height="96" rx="14" fill="url(#nGrad)"/>
    <rect x="82" y="0" width="28" height="96" rx="14" fill="url(#nGrad)"/>
    <rect x="16" y="4" width="28" height="110" rx="14" transform="rotate(-32 16 4)" fill="url(#nGrad)"/>
  </g>

  <text x="150" y="112" fill="#e50914" font-size="86" font-weight="900" letter-spacing="3" font-family="'Segoe UI', Tahoma, Geneva, Verdana, sans-serif">
    NETFLIM
  </text>
</svg>
